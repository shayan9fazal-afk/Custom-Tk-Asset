kind = "web"
previewPath = "/"
title = "YouTube Channel Analyzer"
version = "1.0.0"
id = "artifacts/youtube-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25667

[services.development]
run = "pnpm --filter @workspace/youtube-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/youtube-analyzer", "run", "build" ]
publicDir = "artifacts/youtube-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25667"
BASE_PATH = "/"
